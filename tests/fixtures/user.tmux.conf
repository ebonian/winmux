# Reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Change Default Prefix
unbind C-a
set -g prefix C-a
bind C-a send-prefix

# Mouse Usage
set -g mouse on

# Increase History
set-option -g history-limit 5000

# Numbering Windows and Panes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Swapping Windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# switch panes using Alt-arrow without prefix
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resizing
bind -r C-j resize-pane -D 7
bind -r C-k resize-pane -U 7
bind -r C-h resize-pane -L 15
bind -r C-l resize-pane -R 15

# don't rename windows automatically
set-option -g allow-rename off

# DESIGN TWEAKS
set -g default-terminal "screen-256color"

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour white

# panes
set -g pane-border-style 'fg=colour237'
set -g pane-active-border-style 'fg=colour248'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=white'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=white bg=black'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=white'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=white bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=white]#F '

setw -g window-status-bell-style 'fg=white bg=black bold'

# messages
set -g message-style 'fg=white bg=black bold'

# disable jump in copy mode
set -g @yank_action 'copy-pipe'
unbind -T copy-mode-vi MouseDragEnd1Pane