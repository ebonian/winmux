name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Lint and test (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (lint gate)
        run: cargo clippy --all-targets -- -D warnings

      # Serial (--test-threads=1): many protocol/e2e tests poll transient
      # rendered output or compare wall-clock margins and flake under
      # parallelism on loaded machines (CLAUDE.md, follow-up #89) — a 4-vCPU
      # hosted runner running 4 test threads x (server process + real
      # PowerShell panes each) is the worst case; 13/232 server_proto tests
      # timed out at --test-threads=4. Serial execution is the documented
      # flake-free mode. --no-fail-fast so one failing test binary doesn't
      # hide failures in binaries that would have run after it.
      - name: Test
        run: cargo test --no-fail-fast -- --test-threads=1
