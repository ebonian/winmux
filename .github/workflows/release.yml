name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: git-cliff derives the release notes from the
          # commit range between the previous tag and this one.
          fetch-depth: 0

      - name: Verify tag matches Cargo.toml version
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $manifestVersion = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($tagVersion -ne $manifestVersion) {
            Write-Error "Tag version '$tagVersion' does not match Cargo.toml version '$manifestVersion'"
            exit 1
          }
          Write-Host "Releasing version $manifestVersion"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (lint gate)
        run: cargo clippy --all-targets -- -D warnings

      # Serial, same rationale as ci.yml (CLAUDE.md follow-up #89: serial is
      # the documented flake-free mode; 4 threads oversubscribe a 4-vCPU
      # runner); --no-fail-fast so one failing binary doesn't hide later
      # ones; host-sensitive tests self-skip on hosted images (follow-up
      # #90, see ci.yml).
      - name: Test
        run: cargo test --no-fail-fast -- --test-threads=1
        env:
          WINMUX_TESTS_SKIP_HOST_SENSITIVE: "1"

      - name: Build release binary
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $zip = "winmux-$version-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory dist | Out-Null
          Compress-Archive -Path target\release\winmux.exe -DestinationPath "dist\$zip"
          $hash = (Get-FileHash "dist\$zip" -Algorithm SHA256).Hash.ToLower()
          # Two-space separator: standard sha256sum format, so
          # `sha256sum -c SHA256SUMS` works too.
          [IO.File]::WriteAllText("dist\SHA256SUMS", "$hash  $zip`n")
          Get-Content dist\SHA256SUMS

      # Pinned git-cliff release, downloaded directly (no third-party action);
      # config in cliff.toml. --latest = the range since the previous tag.
      - name: Generate release notes (git-cliff)
        shell: pwsh
        run: |
          $ver = '2.13.1'
          Invoke-WebRequest "https://github.com/orhun/git-cliff/releases/download/v$ver/git-cliff-$ver-x86_64-pc-windows-msvc.zip" -OutFile git-cliff.zip
          Expand-Archive git-cliff.zip -DestinationPath cliff-bin
          & "cliff-bin\git-cliff-$ver\git-cliff.exe" --latest --strip all -o release-notes.md
          Get-Content release-notes.md

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            --title "winmux $env:GITHUB_REF_NAME" `
            --notes-file release-notes.md `
            (Get-ChildItem dist\* | ForEach-Object FullName)
